name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Run cargo check
        run: cargo check

  rust-tests:
    name: Rust Tests (native)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wasm-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm-engine

      - name: Run cargo test
        run: cargo test

  wasm-tests:
    name: WASM Tests (node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wasm-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm-engine

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Run wasm-pack tests
        run: wasm-pack test --node

  frontend-quality:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
